<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>臻的行政百寶箱 - Gem 專業串接版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>

<style>
  :root {
    --paper: #F6F1E8; --card: #FFFFFF; --ink: #20251F; --sub: #7C766A; --line: #E7DFD0;
    --go: #0E7A66; --goSoft: #E1F0EC; --gemini: #4285F4; --danger: #B23A2E;
  }
  * { box-sizing: border-box; }
  body { 
    background: var(--paper); color: var(--ink); 
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
    margin: 0; padding: 0;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 18px; }
  .top { margin-bottom: 24px; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tab { 
    border: 1px solid var(--line); background: var(--card); border-radius: 999px; 
    padding: 10px 18px; font-weight: 700; font-size: 14px; cursor: pointer; color: var(--sub);
  }
  .tab.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .view { display: none; }
  .view.active { display: block; }
  .card { 
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; 
    padding: 20px; margin-bottom: 16px; 
  }
  input, textarea, select {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; 
    font-size: 15px; margin-bottom: 12px; background: #fafafa;
  }
  .btn { 
    background: var(--go); color: #fff; border: none; border-radius: 8px; 
    padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-gemini { background: var(--gemini); }
  .btn-outline { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  
  #toast {
    position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; 
    padding: 12px 24px; border-radius: 8px; opacity: 0; transition: 0.3s; z-index: 100;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 這裡同步了你 Gem 的核心指令 -->
<script type="text/template" id="aiPromptTemplate">
# Role: 全方位職涯策略顧問 (臻的專屬 Gem 邏輯)
你現在是擁有國家級證照的資深顧問，專精台灣 104/1111 平台 SEO。
## 核心方法：
1. **STAR 改寫**：將流水帳轉化為「數據 + 成果」。
2. **禁語監控**：嚴禁「肯學、我願意學習、吃苦耐勞」。必須替換為「具備快速適應力、勇於承擔挑戰、即戰力」。
3. **平台優化**：針對特定職缺關鍵字進行 104 演算法佈局。
## 任務：
請對以下履歷進行【0-100分評分】、【致命傷掃描】、【STAR 具體改寫示範】。
</script>

<div id="toast">通知</div>

<div class="wrap">
  <div class="top">
    <div style="color:var(--go); font-weight:bold; font-size:12px;">ADMIN TOOLBOX</div>
    <h1>臻的行政百寶箱</h1>
    <div class="tabs">
      <button class="tab on" data-target="resume-check">🎨 履歷健診</button>
      <button class="tab" data-target="settings">⚙️ 系統設定</button>
    </div>
  </div>

  <!-- 履歷健診分頁 -->
  <div id="resume-check" class="view active">
    <div class="grid-2">
      <div class="card">
        <h3 style="color:var(--gemini);">🤖 Gemini AI 健診 (Gem 同步模式)</h3>
        <div style="display:flex; gap:8px;">
            <input type="text" id="rcName" placeholder="學員姓名">
            <input type="text" id="rcJob" placeholder="目標職務">
        </div>
        
        <div style="border: 2px dashed var(--go); padding:15px; border-radius:10px; background:var(--goSoft); margin-bottom:15px;">
            <label style="font-weight:bold; color:var(--go);">📄 上傳 PDF 履歷 (繁體中文自動提取)：</label>
            <input type="file" id="rcPdfFile" accept=".pdf" style="margin-top:10px;">
            <div id="pdfStatus" style="font-size:12px; color:var(--go); font-weight:bold;"></div>
        </div>

        <textarea id="rcResumeText" placeholder="PDF 文字會出現在這裡..." style="min-height:200px;"></textarea>
        
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button id="runGeminiBtn" class="btn btn-gemini" onclick="runGeminiDiagnosis()">🚀 啟動 API 自動健檢</button>
            <button class="btn btn-outline" onclick="jumpToGem()">🔗 跳轉到我的 Gem 網頁 (手動模式)</button>
        </div>
      </div>

      <div class="card">
        <h3>📋 診斷報告預覽</h3>
        <textarea id="rcOutput" placeholder="分析結果..." style="min-height:400px;"></textarea>
        <button class="btn" onclick="exportResumePDF()" style="width:100%;">📥 下載精美 A4 報告 (PDF)</button>
      </div>
    </div>
  </div>

  <!-- 設定分頁 -->
  <div id="settings" class="view">
    <div class="card">
      <h3>🔑 API 設定</h3>
      <label>Google Gemini API Key:</label>
      <input type="password" id="geminiKey" placeholder="請輸入 API Key">
      <button class="btn" onclick="saveConfig()">儲存設定</button>
      <p style="font-size:12px; color:var(--sub); margin-top:10px;">
        * API 模式：直接在百寶箱內產出結果。<br>
        * Gem 模式：點擊跳轉鈕，會幫你打開你的 Gem 網址。
      </p>
    </div>
  </div>
</div>

<script>
  // 基礎工具
  function showToast(m) { 
    const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function safeGet(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e) { return d; } }
  function safeSet(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

  // 儲存設定
  let config = safeGet('admin_cfg', { key: '' });
  document.getElementById('geminiKey').value = config.key;
  function saveConfig() {
    config.key = document.getElementById('geminiKey').value.trim();
    safeSet('admin_cfg', config);
    showToast('設定已儲存');
  }

  // 分頁切換
  document.querySelectorAll('.tab').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
      document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
      b.classList.add('on');
      document.getElementById(b.dataset.target).classList.add('active');
    }
  });

  // PDF 解析 (繁體中文優化)
  document.getElementById('rcPdfFile').onchange = async function(e) {
    const f = e.target.files[0]; if(!f) return;
    const stat = document.getElementById('pdfStatus');
    stat.innerText = '⏳ 正在讀取繁體中文內容...';
    try {
      const arrayBuffer = await f.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({
        data: arrayBuffer,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/cmaps/',
        cMapPacked: true,
      }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(s => s.str).join(' ') + '\n';
      }
      document.getElementById('rcResumeText').value = text;
      stat.innerText = '✅ 讀取完成！';
    } catch (err) { stat.innerText = '❌ 讀取失敗'; }
  };

  // API 健檢執行 (模擬 Gem 邏輯)
  async function runGeminiDiagnosis() {
    const key = config.key;
    const resume = document.getElementById('rcResumeText').value;
    const name = document.getElementById('rcName').value || '同學';
    const job = document.getElementById('rcJob').value || '目標職位';
    if(!key) return alert('請先到設定輸入 API Key');
    if(!resume) return alert('請先上傳履歷');

    const btn = document.getElementById('runGeminiBtn');
    btn.disabled = true; btn.innerText = '🤖 AI 診斷中...';

    const prompt = document.getElementById('aiPromptTemplate').innerHTML;
    const finalPrompt = `${prompt}\n\n學員：${name}\n目標：${job}\n履歷：\n${resume}`;

    try {
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: finalPrompt }] }] })
      });
      const data = await resp.json();
      document.getElementById('rcOutput').value = data.candidates[0].content.parts[0].text;
      showToast('診斷完成！');
    } catch (e) { alert('AI 呼叫失敗'); }
    finally { btn.disabled = false; btn.innerText = '🚀 啟動 API 自動健檢'; }
  }

  // 跳轉到 Gem
  function jumpToGem() {
    const text = document.getElementById('rcResumeText').value;
    if(text) {
        // 自動幫使用者複製文字，方便貼上
        navigator.clipboard.writeText(text).then(() => {
            showToast('已自動複製履歷內容！跳轉後直接貼上即可。');
            setTimeout(() => {
                window.open('https://gemini.google.com/gem/1f_q5bDY2eOHN4cbu7O9kLlhA_1VrW3qW?usp=sharing', '_blank');
            }, 1000);
        });
    } else {
        window.open('https://gemini.google.com/gem/1f_q5bDY2eOHN4cbu7O9kLlhA_1VrW3qW?usp=sharing', '_blank');
    }
  }

  // 產出 PDF (簡單 A4 版)
  function exportResumePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const text = document.getElementById('rcOutput').value;
    if(!text) return alert('請先生成報告');
    
    // 由於 jsPDF 對中文支援較複雜，此處建議使用轉圖片或下載純文字。
    // 這裡示範下載成 txt 或簡單提示。
    const blob = new Blob([text], {type: 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '健診報告.txt'; a.click();
  }
</script>
</body>
</html>
