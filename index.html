<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>臻的行政百寶箱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
  :root {
    --paper: #F6F1E8; --card: #FFFFFF; --ink: #20251F; --sub: #7C766A; --line: #E7DFD0;
    --go: #0E7A66; --goSoft: #E1F0EC; --gold: #BE842B; --goldSoft: #F6ECD7;
    --danger: #B23A2E; --dangerSoft: #F6E2DE;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100vh; }
  body { 
    background: var(--paper); color: var(--ink); 
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; 
    -webkit-font-smoothing: antialiased; 
  }
  
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 18px 64px; }
  .fade { animation: fade .45s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }

  .top { margin-bottom: 24px; }
  .kicker { font-size: 13px; letter-spacing: 0.15em; color: var(--go); font-weight: 700; margin-bottom: 4px; }
  h1 { font-size: 28px; font-weight: 800; margin: 0 0 20px 0; }
  
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tab { 
    border: 1px solid var(--line); background: var(--card); border-radius: 999px; 
    padding: 10px 18px; font-weight: 700; font-size: 14px; cursor: pointer; 
    transition: all 0.2s; color: var(--sub);
  }
  .tab:hover { border-color: var(--go); color: var(--go); }
  .tab.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  .view { display: none; }
  .view.active { display: block; }
  .card { 
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; 
    padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
  }
  
  input[type="text"], input[type="date"], input[type="file"], input[type="number"], textarea, select {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; 
    font-size: 15px; margin-bottom: 12px; background: #fafafa; font-family: inherit;
  }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, textarea:focus, select:focus { border-color: var(--go); outline: none; background: #fff; }
  
  .btn { 
    background: var(--go); color: #fff; border: none; border-radius: 8px; 
    padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: #0b6151; transform: translateY(-1px); }
  .btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--dangerSoft); padding: 8px 12px;}
  .btn-danger:hover { background: var(--dangerSoft); }
  .btn-outline { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-outline:hover { border-color: var(--ink); }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
  
  /* 艾森豪四象限矩陣設計 */
  .matrix-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-top: 16px; align-items: start; }
  .matrix-quadrant { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  .quad-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; user-select: none; }
  .quad-title:hover { opacity: 0.8; }
  .q1-title { color: var(--danger); border-bottom-color: var(--dangerSoft); } 
  .q2-title { color: #BE842B; border-bottom-color: var(--goldSoft); } 
  .q3-title { color: #0066FF; border-bottom-color: #CCEEFF; } 
  .q4-title { color: var(--sub); } 

  .note-card {
    background: #fafafa; border: 1px solid var(--line); border-radius: 8px; padding: 12px;
    display: flex; flex-direction: column; justify-content: space-between; position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,0.02);
  }
  .note-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .note-body { font-size: 13px; color: var(--sub); margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; }
  .note-due { font-size: 11px; font-weight: 600; padding: 3px 6px; border-radius: 4px; display: inline-block; }
  
  .dashboard-stat { text-align: center; padding: 24px; background: #fff; border: 1px solid var(--line); border-radius: 12px; }
  .dashboard-stat h2 { margin: 0; font-size: 36px; color: var(--go); }
  .dashboard-stat p { margin: 8px 0 0; color: var(--sub); font-weight: 600; }
  
  .slider-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .slider-group input { flex: 1; margin: 0; padding: 0; height: auto; }

  /* 行事曆專用樣式 */
  .cal-wrap { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f9f9f9; border-bottom: 1px solid var(--line); }
  .cal-header button { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 4px 12px; cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--line); gap: 1px; }
  .cal-th { background: #f1f1f1; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; color: var(--sub); }
  .cal-td { background: #fff; min-height: 80px; padding: 4px; position: relative; cursor: pointer; transition: 0.2s;}
  .cal-td:hover { background: #f0f7f5; }
  .cal-td.empty { background: #fafafa; cursor: default; }
  .cal-td.today { background: var(--goldSoft); }
  .cal-date { font-size: 12px; color: var(--sub); margin-bottom: 4px; text-align: right; }
  .cal-item { font-size: 11px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: grab; }
  .cal-item:active { cursor: grabbing; opacity: 0.6; }
  .cal-item:hover { opacity: 0.8; }
  
  /* 自訂顏色標籤 */
  .c-green { background: #CCFF99; color: #55AA00; }
  .c-danger { background: var(--dangerSoft); color: var(--danger); }
  .c-blue { background: #CCEEFF; color: #0066FF; }
  .c-purple { background: #f3e8ff; color: #4400CC; }
  .c-orange { background: #FFEFD5; color: #BB5500; }
  .c-gray { background: #DDDDDD; color: #888888; }
  .c-brown { background: #D2B48C; color: #8B4513; }
  .c-pink { background: #FFE4E1; color: #C71585; }  
  .c-completed { background: #ffffff !important; color: #aaaaaa !important; border: 1px dashed #cccccc !important; text-decoration: line-through; }

  /* 常用連結樣式 */
  .quick-link-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--goSoft); border-radius: 8px; transition: 0.2s; border: 1px solid transparent; }
  .quick-link-item:hover { border-color: var(--go); transform: translateY(-1px); }
